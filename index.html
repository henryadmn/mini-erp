<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini ERP - Quản lý bán hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --navy:#12203C; --navy-2:#1B2E52; --teal:#0E9C97; --teal-light:#E3F6F5;
  --amber:#E8A33D; --amber-light:#FBEEDA; --green:#1E8E5A; --green-light:#E4F5EC;
  --red:#D6455A; --red-light:#FCE7EA; --blue:#3B6FE8; --blue-light:#E9EFFD;
  --bg:#F4F6FA; --surface:#FFFFFF; --border:#E3E7EF; --text:#1B2233; --muted:#6B7386; --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;max-width:100%;overflow-x:hidden;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);}
h1,h2,h3,.display{font-family:'Manrope',sans-serif;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:13.5px;max-width:100%;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#C7CDDB;border-radius:8px;}

#app{display:flex;min-height:100vh;max-width:100%;overflow-x:hidden;}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);color:#fff;display:flex;flex-direction:column;padding:18px 0;}
.brand{padding:0 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:10px;}
.brand .logo{font-family:'Manrope',sans-serif;font-weight:800;font-size:18px;}
.brand .sub{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:11px 20px;color:rgba(255,255,255,.75);font-size:13.5px;font-weight:600;cursor:pointer;border-left:3px solid transparent;transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--teal);}
.nav-item .ic{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-item span:not(.ic):not(.nav-badge){overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.sidebar-footer{margin-top:auto;padding:14px 20px 0;border-top:1px solid rgba(255,255,255,.1);}
.sb-btn{display:block;width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:8px 8px;border-radius:8px;font-size:11.5px;margin-top:8px;text-align:left;}
.sb-btn:hover{background:rgba(255,255,255,.16);}

/* MAIN */
.main{flex:1;min-width:0;max-width:100%;overflow-x:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:5;}
.topbar h1{font-size:18px;margin:0;font-weight:800;}
.topbar .meta{font-size:12px;color:var(--muted);margin-top:2px;}
.topbar-actions{display:flex;gap:8px;flex-wrap:wrap;}
.content{padding:20px 22px 60px;max-width:100%;overflow-x:hidden;}

/* GRID / CARDS */
.grid{display:grid;gap:14px;}
.grid-kpi{grid-template-columns:repeat(auto-fit,minmax(170px,1fr));}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-width:0;}
.kpi .label{font-size:12px;color:var(--muted);font-weight:600;}
.kpi .value{font-family:'Manrope',sans-serif;font-size:23px;font-weight:800;margin-top:5px;word-break:break-word;}
.kpi .foot{font-size:11px;margin-top:5px;color:var(--muted);}
.kpi.accent-teal .value{color:var(--teal);}
.kpi.accent-amber .value{color:var(--amber);}
.kpi.accent-green .value{color:var(--green);}
.kpi.accent-red .value{color:var(--red);}

.section-title{font-size:14.5px;font-weight:800;margin:24px 0 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.section-title .hint{font-size:11.5px;color:var(--muted);font-weight:500;}

/* BUTTONS */
.btn{border:none;border-radius:8px;padding:9px 13px;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-primary{background:var(--teal);color:#fff;} .btn-primary:hover{background:#0b847f;}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);} .btn-secondary:hover{background:#F0F2F7;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:5px 9px;font-size:11.5px;border-radius:6px;}
.btn-ghost{background:transparent;color:var(--teal);padding:4px 6px;}

/* TABLE - no horizontal scroll, wraps instead */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
table{border-collapse:collapse;width:100%;table-layout:auto;font-size:12.5px;}
th{text-align:left;padding:10px 10px;background:#F8F9FC;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.2px;border-bottom:1px solid var(--border);}
th[onclick]{cursor:pointer;user-select:none;}
th[onclick]:hover{color:var(--teal);}
td{padding:9px 10px;border-bottom:1px solid #F0F1F5;vertical-align:top;word-break:break-word;overflow-wrap:anywhere;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBFD;}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;white-space:nowrap;}
.muted{color:var(--muted);}
.small{font-size:11px;}
.search-bar{display:flex;gap:9px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.search-bar input[type=text]{padding:9px 12px;border:1px solid var(--border);border-radius:8px;flex:1;min-width:180px;max-width:320px;}
select.inline-select{padding:4px 16px 4px 6px;border-radius:6px;border:1px solid var(--border);font-size:10.5px;font-weight:600;width:100%;max-width:100%;box-sizing:border-box;height:26px;line-height:1;appearance:none;-webkit-appearance:none;-moz-appearance:none;background-color:#fff;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='none' stroke='%236B7386' stroke-width='2.2'%3e%3cpath d='M5 8l5 5 5-5'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 3px center;background-size:11px;}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,20,35,.5);display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto;z-index:50;}
.modal{background:#fff;border-radius:14px;max-width:640px;width:100%;overflow:hidden;}
.modal-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{margin:0;font-size:16px;}
.modal-body{padding:18px 22px;max-height:68vh;overflow-y:auto;overflow-x:hidden;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
.close-x{background:none;border:none;font-size:18px;color:var(--muted);}
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:#33394C;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:#FCFCFE;}
.form-row .hint{font-size:11px;color:var(--muted);margin-top:4px;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.item-row{display:grid;grid-template-columns:2.1fr 0.8fr 1fr auto;gap:7px;align-items:start;background:#F8F9FC;padding:8px;border-radius:8px;margin-bottom:7px;}
.item-row select,.item-row input{width:100%;}
.item-row .stock-note{font-size:10px;color:var(--muted);margin-top:2px;}
.rm-item{background:var(--red-light);color:var(--red);border:none;border-radius:6px;width:28px;height:34px;}
.totalbox{background:var(--teal-light);border-radius:8px;padding:11px 13px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;flex-wrap:wrap;gap:6px;}
.totalbox b{font-size:15px;color:var(--teal);}
.type-label{display:inline-block;background:var(--teal-light);color:var(--teal);font-weight:800;padding:6px 12px;border-radius:8px;font-size:12.5px;}
.banner{background:var(--amber-light);border:1px solid #F0D9AE;color:#7A5615;padding:10px 13px;border-radius:9px;font-size:12.5px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.empty{text-align:center;padding:36px;color:var(--muted);font-size:12.5px;}
.bars{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:10px;overflow:hidden;}
.bar{flex:1;background:var(--teal);border-radius:4px 4px 0 0;position:relative;min-height:2px;}
.bar span{position:absolute;top:-17px;left:0;right:0;text-align:center;font-size:9.5px;color:var(--muted);}
.bar-label{font-size:9.5px;color:var(--muted);text-align:center;margin-top:4px;flex:1;}
.hist-list{max-height:220px;overflow-y:auto;overflow-x:hidden;}
.hist-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0F1F5;font-size:12px;gap:8px;}
.trend-up{color:var(--green);font-weight:700;}
.trend-down{color:var(--red);font-weight:700;}
.trend-flat{color:var(--muted);font-weight:700;}
.progress-bg{background:#EDEFF4;border-radius:6px;height:6px;overflow:hidden;margin-top:5px;}
.progress-fill{background:var(--teal);height:100%;}
@media(max-width:640px){
  .sidebar{width:60px;}
  .brand .sub, .nav-item span:not(.ic):not(.nav-badge){display:none;}
  .nav-item{justify-content:center;padding:11px 6px;}
  .sidebar-footer{padding:14px 6px 0;}
  .sb-btn{font-size:0;padding:8px;} .sb-btn::first-letter{font-size:14px;}
  .form-2col{grid-template-columns:1fr;}
  .item-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar">
    <div class="brand"><div class="logo">🛒 MiniERP</div><div class="sub">Quản lý bán hàng</div></div>
    <div id="navMenu"></div>
    <div class="sidebar-footer">
      <button class="sb-btn" id="sheetStatusBtn" onclick="openSheetSettings()">🔗 Google Sheets: chưa kết nối</button>
      <button class="sb-btn" onclick="exportBackup()">⬇ Sao lưu dữ liệu</button>
      <button class="sb-btn" onclick="document.getElementById('backupFile').click()">⬆ Phục hồi dữ liệu</button>
      <input type="file" id="backupFile" style="display:none" accept="application/json" onchange="importBackup(this.files[0])">
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div><h1 id="pageTitle">Tổng quan</h1><div class="meta" id="pageMeta"></div></div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modalRoot"></div>

<script>
/* ======================= DATA LAYER ======================= */
const SHEET_CONFIG_KEY = 'erp_sheet_config';
const SHEETS_SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
let DB = { products: [], orders: [], complaints: [], seq:{product:0, order:0, complaint:0} };
let activeTab = 'dashboard';
let inv = { search:'' };
let ordUi = { search:'', statusFilter:'', paymentFilter:'', carrierFilter:'' };
let sheetConfig = { clientId:'', spreadsheetId:'' };
let gTokenClient = null;
let gAccessToken = null;
let gConnected = false;
let gPollTimer = null;

/* ---- Google Sheets sync layer ---- */
async function loadSheetConfig(){
  try{ const raw = localStorage.getItem(SHEET_CONFIG_KEY); if(raw) sheetConfig = JSON.parse(raw); }
  catch(e){ /* not configured yet */ }
  updateSheetStatusUI();
}
async function saveSheetConfig(){
  try{ localStorage.setItem(SHEET_CONFIG_KEY, JSON.stringify(sheetConfig)); }catch(e){ console.error(e); }
}
function updateSheetStatusUI(){
  const btn = document.getElementById('sheetStatusBtn');
  if(!btn) return;
  if(gConnected) btn.textContent = '🟢 Google Sheets: đã kết nối';
  else if(sheetConfig.clientId && sheetConfig.spreadsheetId) btn.textContent = '🟡 Google Sheets: chưa đăng nhập';
  else btn.textContent = '🔗 Google Sheets: chưa kết nối';
}
function openSheetSettings(){
  openModal(`
    <div class="modal-head"><h3>Kết nối Google Sheets</h3><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="hint" style="margin-bottom:12px">Dữ liệu sẽ được lưu dưới dạng 1 chuỗi JSON trong tab tên "Data" của Google Sheet — không hiển thị dạng bảng đẹp trong Sheets, chỉ dùng Sheet làm nơi lưu trữ chung.</div>
      <div class="form-row"><label>Google Client ID</label><input id="cfg_client" value="${sheetConfig.clientId||''}" placeholder="xxxxx.apps.googleusercontent.com"></div>
      <div class="form-row"><label>Spreadsheet ID</label><input id="cfg_sheet" value="${sheetConfig.spreadsheetId||''}" placeholder="Lấy từ URL giữa /d/ và /edit"></div>
      <div class="hint">Đảm bảo Google Sheet có 1 tab tên chính xác là "Data" và cả 2 tài khoản Google đều có quyền Editor trên Sheet đó.</div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
      <button class="btn btn-primary" onclick="saveSheetSettingsAndConnect()">Lưu & Đăng nhập Google</button>
    </div>
  `);
}
async function saveSheetSettingsAndConnect(){
  const clientId = document.getElementById('cfg_client').value.trim();
  const spreadsheetId = document.getElementById('cfg_sheet').value.trim();
  if(!clientId || !spreadsheetId){ alert('Vui lòng nhập đủ Client ID và Spreadsheet ID'); return; }
  sheetConfig = { clientId, spreadsheetId };
  await saveSheetConfig();
  closeModal();
  connectGoogleSheets();
}
function connectGoogleSheets(){
  if(!sheetConfig.clientId || !sheetConfig.spreadsheetId){ openSheetSettings(); return; }
  if(typeof google === 'undefined' || !google.accounts){
    alert('Không tải được thư viện đăng nhập Google (accounts.google.com). Có thể môi trường đang chặn script này.');
    return;
  }
  try{
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: sheetConfig.clientId,
      scope: SHEETS_SCOPE,
      callback: handleGoogleTokenResponse,
    });
    gTokenClient.requestAccessToken({prompt: gAccessToken? '' : 'consent'});
  }catch(e){
    alert('Lỗi khởi tạo đăng nhập Google: '+e.message);
  }
}
async function handleGoogleTokenResponse(resp){
  if(resp.error){ alert('Đăng nhập Google thất bại: '+resp.error); gConnected=false; updateSheetStatusUI(); return; }
  gAccessToken = resp.access_token;
  gConnected = true;
  updateSheetStatusUI();
  await loadDBFromSheet();
  navigate(activeTab||'dashboard');
  if(!gPollTimer){
    gPollTimer = setInterval(async ()=>{
      const modalOpen = document.getElementById('modalRoot').innerHTML.trim().length>0;
      const typingNow = document.activeElement && ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
      if(gConnected && !modalOpen && !typingNow){ await loadDBFromSheet(); render(); renderNav(); }
    }, 20000);
  }
}
async function sheetsApiFetch(method, body, range){
  range = range || 'Data!A1:A400';
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetConfig.spreadsheetId}/values/${encodeURIComponent(range)}${method==='PUT'?'?valueInputOption=RAW':''}`;
  const res = await fetch(url, {
    method,
    headers: { 'Authorization': 'Bearer '+gAccessToken, 'Content-Type': 'application/json' },
    body: body? JSON.stringify(body) : undefined,
  });
  if(res.status===401){
    gConnected = false; updateSheetStatusUI();
    alert('Phiên đăng nhập Google đã hết hạn. Bấm "Google Sheets" ở menu trái để đăng nhập lại.');
    throw new Error('unauthorized');
  }
  if(!res.ok){
    const errText = await res.text();
    throw new Error('Sheets API lỗi ('+res.status+'): '+errText.slice(0,200));
  }
  return res.json();
}
// Mỗi ô chỉ chứa tối đa ~45.000 ký tự (an toàn dưới giới hạn 50.000 của Google Sheets).
// Dữ liệu được chia nhỏ và ghi vào nhiều ô liên tiếp trong cột A, chia theo khối cố định cho từng loại dữ liệu.
const CHUNK_SIZE = 45000;
const SHEET_BLOCKS = { products:{start:0, size:60}, orders:{start:60, size:120}, complaints:{start:180, size:40}, seq:{start:220, size:2} };
const SHEET_TOTAL_ROWS = 222;
function chunkString(str, size){
  const chunks = [];
  for(let i=0;i<str.length;i+=size) chunks.push(str.slice(i,i+size));
  return chunks.length? chunks : [''];
}
async function loadDBFromSheet(){
  try{
    const data = await sheetsApiFetch('GET', null, `Data!A1:A${SHEET_TOTAL_ROWS}`);
    const rows = (data.values||[]).map(r=>(r&&r[0])||'');
    while(rows.length<SHEET_TOTAL_ROWS) rows.push('');
    const isEmpty = rows.every(r=>r==='');
    if(isEmpty){
      await saveDBToSheet(); // initialize empty sheet with current local DB
      return;
    }
    // Nhận diện & chuyển đổi dữ liệu cũ (toàn bộ DB nhét trong 1 ô A1) sang định dạng chia nhỏ mới, tránh mất dữ liệu
    if(rows[0]){
      try{
        const legacy = JSON.parse(rows[0]);
        if(legacy && Array.isArray(legacy.products) && Array.isArray(legacy.orders)){
          DB.products = legacy.products; DB.orders = legacy.orders;
          DB.complaints = legacy.complaints||[]; DB.seq = legacy.seq||{product:0, order:0, complaint:0};
          await saveDBToSheet(); // ghi lại theo định dạng mới
          return;
        }
      }catch(e){ /* không phải định dạng cũ, đọc bình thường theo khối bên dưới */ }
    }
    const readBlock = (key)=>{
      const b = SHEET_BLOCKS[key];
      return rows.slice(b.start, b.start+b.size).join('');
    };
    const productsStr = readBlock('products');
    const ordersStr = readBlock('orders');
    const complaintsStr = readBlock('complaints');
    const seqStr = readBlock('seq');
    DB.products = productsStr? JSON.parse(productsStr) : [];
    DB.orders = ordersStr? JSON.parse(ordersStr) : [];
    DB.complaints = complaintsStr? JSON.parse(complaintsStr) : [];
    DB.seq = seqStr? JSON.parse(seqStr) : {product:0, order:0, complaint:0};
  }catch(e){
    console.error(e);
    alert('Không đọc được dữ liệu từ Google Sheet. Kiểm tra: Spreadsheet ID đúng chưa, tab tên "Data" đã tạo chưa, tài khoản đã được chia sẻ quyền Editor chưa.\n\nChi tiết: '+e.message);
  }
}
async function saveDBToSheet(){
  try{
    const values = new Array(SHEET_TOTAL_ROWS).fill(['']);
    const writeBlock = (key, str)=>{
      const b = SHEET_BLOCKS[key];
      const chunks = chunkString(str, CHUNK_SIZE);
      if(chunks.length>b.size){
        throw new Error(`Dữ liệu "${key}" đã quá lớn (vượt quá dung lượng dự trù). Báo cho người hỗ trợ để mở rộng thêm chỗ chứa.`);
      }
      chunks.forEach((c,i)=>{ values[b.start+i] = [c]; });
    };
    writeBlock('products', JSON.stringify(DB.products));
    writeBlock('orders', JSON.stringify(DB.orders));
    writeBlock('complaints', JSON.stringify(DB.complaints));
    writeBlock('seq', JSON.stringify(DB.seq));
    await sheetsApiFetch('PUT', { values }, `Data!A1:A${SHEET_TOTAL_ROWS}`);
  }catch(e){
    console.error(e);
    alert('Không lưu được dữ liệu lên Google Sheet.\n\nChi tiết: '+e.message);
  }
}

async function loadDB(){
  await loadDBFromSheet();
}
async function saveDB(){
  await saveDBToSheet();
}
function uid(){ return 'id_'+Math.random().toString(36).slice(2)+Date.now().toString(36); }
function genCode(prefix, key, pad=4){
  DB.seq[key] = (DB.seq[key]||0)+1;
  const n = String(DB.seq[key]).padStart(pad,'0');
  const r = Math.random().toString(36).slice(2,4).toUpperCase();
  return prefix+n+r; // random suffix keeps codes unique even if 2 máy tạo gần cùng lúc trước khi kịp đồng bộ
}
function fmt(n){ return (Math.round(n||0)).toLocaleString('vi-VN')+'đ'; }
function fmtDate(d){ if(!d) return '—'; const x=new Date(d); return x.toLocaleDateString('vi-VN')+' '+x.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}); }
/* ---- Sắp xếp bảng dùng chung ---- */
function toggleSort(state, key){
  if(state.key===key) state.dir = -state.dir; else { state.key = key; state.dir = 1; }
}
function sortArrow(state, key){ return state.key===key ? (state.dir===1?' ▲':' ▼') : ''; }
function cmpVals(a,b){
  if(a==null && b==null) return 0;
  if(a==null) return -1;
  if(b==null) return 1;
  if(typeof a==='number' && typeof b==='number') return a-b;
  return String(a).localeCompare(String(b), 'vi', {numeric:true, sensitivity:'base'});
}

function computePreorderNeeds(){
  const map = {};
  DB.orders.filter(o=>o.type==='preorder' && o.status==='cho_hang').forEach(o=>{
    o.items.forEach(it=>{ map[it.productId] = (map[it.productId]||0) + Number(it.qty); });
  });
  return Object.keys(map).map(pid=>{
    const p = DB.products.find(x=>x.id===pid);
    if(!p) return null;
    const diff = p.stock - map[pid];
    return {code:p.code, name:p.name, stock:p.stock, needed:map[pid], diff};
  }).filter(Boolean);
}
function stockDiffStatus(diff){
  if(diff<0) return {key:'thieu', dot:'🔴', label:'Thiếu '+Math.abs(diff)};
  if(diff===0) return {key:'vua_du', dot:'🟡', label:'Vừa đủ'};
  if(diff<=9) return {key:'thap', dot:'🟠', label:'Tồn thấp'};
  return {key:'an_toan', dot:'🟢', label:'An toàn'};
}
const STOCK_DIFF_LABELS = {thieu:'Thiếu hàng', vua_du:'Vừa đủ', thap:'Tồn thấp', an_toan:'An toàn'};
const STOCK_DIFF_ORDER = {thieu:0, vua_du:1, thap:2, an_toan:3};
let preorderNeedsSort = {key:'code', dir:1};
let preorderNeedsFilter = []; // rỗng = hiển thị tất cả
let preorderFilterOpen = false;
function preorderNeedsSortVal(r, key){
  if(key==='status') return STOCK_DIFF_ORDER[stockDiffStatus(r.diff).key];
  return r[key];
}
function togglePreorderFilter(){ preorderFilterOpen = !preorderFilterOpen; renderPreorderNeeds(); }
function togglePreorderFilterKey(k){
  const allKeys = Object.keys(STOCK_DIFF_LABELS);
  let current = preorderNeedsFilter.length? preorderNeedsFilter.slice() : allKeys.slice();
  const idx = current.indexOf(k);
  if(idx>=0) current.splice(idx,1); else current.push(k);
  preorderNeedsFilter = (current.length===allKeys.length)? [] : current;
  renderPreorderNeeds();
}
function renderPreorderNeeds(){
  const allNeeds = computePreorderNeeds();
  let needs = preorderNeedsFilter.length? allNeeds.filter(r=>preorderNeedsFilter.includes(stockDiffStatus(r.diff).key)) : allNeeds.slice();
  needs.sort((a,b)=> cmpVals(preorderNeedsSortVal(a,preorderNeedsSort.key), preorderNeedsSortVal(b,preorderNeedsSort.key)) * preorderNeedsSort.dir);
  document.getElementById('invPreorderNeeds').innerHTML = `
    <div class="table-wrap"><table><thead><tr>
      <th onclick="toggleSort(preorderNeedsSort,'code'); renderPreorderNeeds()">Mã SP${sortArrow(preorderNeedsSort,'code')}</th>
      <th onclick="toggleSort(preorderNeedsSort,'name'); renderPreorderNeeds()">Tên sản phẩm${sortArrow(preorderNeedsSort,'name')}</th>
      <th onclick="toggleSort(preorderNeedsSort,'stock'); renderPreorderNeeds()">Tồn kho hiện tại${sortArrow(preorderNeedsSort,'stock')}</th>
      <th onclick="toggleSort(preorderNeedsSort,'needed'); renderPreorderNeeds()">Tổng SL đặt trước${sortArrow(preorderNeedsSort,'needed')}</th>
      <th onclick="toggleSort(preorderNeedsSort,'diff'); renderPreorderNeeds()">Chênh lệch tồn kho${sortArrow(preorderNeedsSort,'diff')}</th>
      <th onclick="toggleSort(preorderNeedsSort,'status'); renderPreorderNeeds()">Trạng thái tồn kho${sortArrow(preorderNeedsSort,'status')}</th>
    </tr></thead><tbody>
    ${needs.length? needs.map(r=>{ const st = stockDiffStatus(r.diff); return `<tr><td>${r.code}</td><td>${r.name}</td><td>${r.stock}</td><td>${r.needed}</td><td style="font-weight:800">${r.diff>0?'+':''}${r.diff}</td><td>${st.dot} ${st.label}</td></tr>`; }).join('') : `<tr><td colspan="6" class="empty">${allNeeds.length? 'Không có dòng nào khớp bộ lọc đang chọn' : 'Chưa có nhu cầu preorder nào'}</td></tr>`}
    </tbody></table></div>
    <div style="position:relative;margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${allNeeds.length? `<button class="btn btn-secondary btn-sm" onclick="togglePreorderFilter()">🔽 Lọc trạng thái${preorderNeedsFilter.length? ' ('+preorderNeedsFilter.length+')':''}</button>` : ''}
      ${allNeeds.length? `<button class="btn btn-secondary" onclick="exportPreorderNeeds()">⬇ Xuất file cần đặt hàng (Excel)</button>` : ''}
      ${preorderFilterOpen? `
      <div class="card" style="position:absolute;bottom:36px;left:0;z-index:10;padding:10px;min-width:190px;box-shadow:0 4px 16px rgba(0,0,0,.15)">
        <div style="font-weight:700;font-size:12px;margin-bottom:6px">Chọn trạng thái hiển thị</div>
        ${Object.entries(STOCK_DIFF_LABELS).map(([k,label])=>`
          <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;padding:3px 0;cursor:pointer">
            <input type="checkbox" ${(preorderNeedsFilter.length===0||preorderNeedsFilter.includes(k))?'checked':''} onchange="togglePreorderFilterKey('${k}')"> ${label}
          </label>`).join('')}
        <div style="display:flex;gap:6px;margin-top:6px">
          <button class="btn btn-ghost btn-sm" onclick="preorderNeedsFilter=[]; renderPreorderNeeds()">Xóa lọc</button>
          <button class="btn btn-ghost btn-sm" onclick="togglePreorderFilter()">Đóng</button>
        </div>
      </div>`:''}
    </div>
  `;
}

function handleProductImageSelect(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const img = new Image();
  const reader = new FileReader();
  reader.onload = (e)=>{
    img.onload = ()=>{
      const size = 96;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      productModalImage = canvas.toDataURL('image/jpeg', 0.7);
      const box = document.getElementById('imgPreviewBox');
      if(box) box.innerHTML = `<img id="imgPreview" src="${productModalImage}" style="width:100%;height:100%;object-fit:cover">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

  const box = document.getElementById('imgPreviewBox');

function refreshImportForm(){ document.getElementById('modalRoot').querySelector('.modal').innerHTML = importFormHtml(); }
function doBatchImport(){
  const valid = importForm.rows.filter(r=>r.productId && r.qty>0);
  if(valid.length===0){ alert('Vui lòng chọn ít nhất 1 sản phẩm với số lượng > 0'); return; }
  const readyBefore = Object.values(getPreorderReadiness()).filter(Boolean).length;
  valid.forEach(r=>{
    const p = DB.products.find(x=>x.id===r.productId);
    const oldStockValue = p.stock * p.importPrice;
    const newStock = p.stock + r.qty;
    const unitPrice = r.qty>0 ? Math.round(r.totalValue/r.qty) : 0;
    p.importPrice = newStock>0 ? Math.round((oldStockValue + r.totalValue)/newStock) : unitPrice;
    p.stock = newStock;
    p.history.push({date:todayISO(), qty:r.qty, price:unitPrice});
  });
  saveDB(); closeModal(); importForm=null;
  if(activeTab==='inventory') renderInventoryResults();
  renderNav();
  const readyAfter = Object.values(getPreorderReadiness()).filter(Boolean).length;
  if(readyAfter>readyBefore) alert('✅ Đã nhập kho. Hiện có '+readyAfter+' đơn đặt trước đủ hàng — có thể chuyển sang xác nhận ở tab Đơn hàng.');
}

function zaloLink(phone){
  let digits = (phone||'').replace(/\D/g,'');
  if(!digits) return '';
  if(digits.startsWith('0')) digits = '84'+digits.slice(1);
  else if(!digits.startsWith('84')) digits = '84'+digits;
  return 'https://zalo.me/'+digits;
}

function getPreorderReadiness(){
  const pendingByProduct = {};
  DB.orders.filter(o=>o.type==='preorder' && o.status==='cho_hang').forEach(o=>{
    o.items.forEach(it=>{
      pendingByProduct[it.productId] = pendingByProduct[it.productId]||[];
      pendingByProduct[it.productId].push({orderId:o.id, qty:Number(it.qty), priority:o.priority, createdAt:o.createdAt});
    });
  });
  const ready = {};
  Object.keys(pendingByProduct).forEach(pid=>{
    const p = DB.products.find(x=>x.id===pid);
    let avail = p? p.stock:0;
    const list = pendingByProduct[pid].sort((a,b)=>{
      if(a.priority!==b.priority) return a.priority==='gap'? -1:1;
      return new Date(a.createdAt)-new Date(b.createdAt);
    });
    list.forEach(item=>{
      if(avail>=item.qty){ ready[item.orderId]=true; avail-=item.qty; }
      else if(ready[item.orderId]===undefined){ ready[item.orderId]=false; }
    });
  });
  return ready;
}

function updateOrderStatus(orderId, newStatus){
  const o = DB.orders.find(x=>x.id===orderId);
  if(!o) return;
  if(newStatus==='xac_nhan' && !o.stockDeducted){
    const insufficient = o.items.filter(it=>{ const p=DB.products.find(x=>x.id===it.productId); return !p || p.stock<it.qty; });
    if(insufficient.length){ alert('Không đủ hàng trong kho cho: '+insufficient.map(i=>i.name).join(', ')); renderOrdersResults(); return; }
    o.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock-=it.qty; });
    o.stockDeducted = true;
  }
  if((newStatus==='huy'||newStatus==='nhap'||newStatus==='cho_hang') && o.stockDeducted){
    o.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock+=it.qty; });
    o.stockDeducted = false;
  }
  o.status = newStatus; o.updatedAt = todayISO();
  saveDB(); renderOrdersResults(); renderNav();
}
function updatePaymentStatus(orderId, newStatus){
  const o = DB.orders.find(x=>x.id===orderId); if(!o) return;
  o.paymentStatus = newStatus; o.updatedAt = todayISO();
  saveDB(); renderOrdersResults();
}
function deleteOrderConfirm(orderId){
  const o = DB.orders.find(x=>x.id===orderId);
  if(!o) return;
  if(o.status!=='huy'){ alert('Chỉ có thể xóa vĩnh viễn các đơn đang ở trạng thái Hủy.'); return; }
  if(!confirm(`Bạn có chắc chắn muốn XÓA đơn hàng ${o.code} (${o.customerName}) khỏi hệ thống?`)) return;
  if(!confirm(`Xác nhận lại lần nữa: xóa vĩnh viễn đơn ${o.code}? Hành động này KHÔNG THỂ hoàn tác.`)) return;
  DB.orders = DB.orders.filter(x=>x.id!==orderId);
  saveDB(); renderOrdersResults(); renderNav();
}

function itemRowsHtml(locked){
  const f = orderForm;
  if(f.items.length===0) return `<div class="muted small" style="margin-bottom:8px">Chưa có sản phẩm nào trong đơn</div>`;
  return f.items.map((it,idx)=>{
    const p = DB.products.find(x=>x.id===it.productId);
    const stock = p? p.stock : 0;
    return `<div class="item-row" data-idx="${idx}">
      <div style="position:relative">
        <input type="text" id="prodSearch_${idx}" value="${p? p.name : ''}" placeholder="Gõ tên sản phẩm để tìm..." autocomplete="off"
          ${locked?'disabled':''}
          oninput="showProductSuggestions(${idx}, this.value)"
          onfocus="showProductSuggestions(${idx}, this.value)"
          onblur="setTimeout(()=>hideProductSuggestions(${idx}),150)">
        <div id="prodSuggest_${idx}"></div>
        ${(f.type==='normal' && p)? `<div class="stock-note">Còn lại trong kho: ${stock}</div>`:''}
      </div>
      <div><input type="number" ${locked?'disabled':''} min="1" ${f.type==='normal'&&p?`max="${stock}"`:''} value="${it.qty}" oninput="setOrderItemQty(${idx}, this.value)" onblur="validateOrderItemQty(${idx})"></div>
      <div><input type="number" ${locked?'disabled':''} value="${it.price}" oninput="setOrderItemPrice(${idx}, this.value)"></div>
      <div>${locked?'':`<button class="rm-item" onclick="removeOrderItem(${idx})">✕</button>`}</div>
    </div>`;
  }).join('');
}
function showProductSuggestions(idx, query){
  const box = document.getElementById('prodSuggest_'+idx);
  if(!box) return;
  const q = (query||'').trim().toLowerCase();
  const matches = DB.products.filter(p=> (p.name+' '+p.code).toLowerCase().includes(q));
  if(matches.length===0){
    box.innerHTML = q? `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;padding:8px 10px;font-size:12px;color:var(--muted);margin-top:2px">Không tìm thấy sản phẩm phù hợp</div>` : '';
    return;
  }
  box.innerHTML = `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;max-height:280px;overflow-y:auto;overflow-x:hidden;margin-top:2px">
    ${matches.map(p=>`<div style="padding:8px 10px;cursor:pointer;border-bottom:1px solid #F0F1F5;font-size:12.5px;display:flex;gap:8px;align-items:center" onmousedown="selectProductForItem(${idx}, '${p.id}')">
      <div style="width:28px;height:28px;border-radius:6px;overflow:hidden;background:#F8F9FC;border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center">
        ${p.image? `<img src="${p.image}" style="width:100%;height:100%;object-fit:cover">` : `<span style="font-size:13px">📦</span>`}
      </div>
      <div><b>${p.name}</b><div class="muted small">${p.code} — Tồn: ${p.stock} — ${fmt(p.sellPrice)}</div></div>
    </div>`).join('')}
  </div>`;
}
function hideProductSuggestions(idx){
  const box = document.getElementById('prodSuggest_'+idx);
  if(box) box.innerHTML='';
}
function selectProductForItem(idx, productId){
  setOrderItemProduct(idx, productId);
}
function getCustomerHistory(){
  const map = {};
  DB.orders.forEach(o=>{
    if(!o.phone) return;
    map[o.phone] = {phone:o.phone, customerName:o.customerName, address:o.address, updatedAt:o.updatedAt||o.createdAt};
  });
  return Object.values(map);
}
function showPhoneSuggestions(query){
  query = (query||'').trim();
  const box = document.getElementById('phoneSuggestions');
  if(!box) return;
  if(!query){ box.innerHTML=''; return; }
  const matches = getCustomerHistory().filter(c=>c.phone.includes(query)).slice(0,5);
  if(matches.length===0){ box.innerHTML=''; return; }
  box.innerHTML = `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:20;max-height:180px;overflow-y:auto;overflow-x:hidden;margin-top:2px">
    ${matches.map(c=>`<div style="padding:8px 10px;cursor:pointer;border-bottom:1px solid #F0F1F5;font-size:12.5px" onmousedown="selectPhoneSuggestion('${c.phone}')">
      <b>${c.phone}</b> — ${c.customerName}<div class="muted small">${c.address}</div>
    </div>`).join('')}
  </div>`;
}
function hidePhoneSuggestions(){
  const box = document.getElementById('phoneSuggestions');
  if(box) box.innerHTML='';
}
function selectPhoneSuggestion(phone){
  const match = getCustomerHistory().find(c=>c.phone===phone);
  if(match){
    orderForm.phone = match.phone;
    orderForm.customerName = match.customerName;
    orderForm.address = match.address;
    orderForm._foundCustomer = true;
  }
  refreshOrderForm();
}
function autofillFromPhone(phone){
  phone = (phone||'').trim();
  if(!phone) return;
  const match = [...DB.orders].reverse().find(o=>o.phone && o.phone.trim()===phone);
  if(match){
    let changed = false;
    if(!orderForm.customerName.trim()){ orderForm.customerName = match.customerName; changed = true; }
    if(!orderForm.address.trim()){ orderForm.address = match.address; changed = true; }
    orderForm.phone = phone;
    if(changed) orderForm._foundCustomer = true;
    refreshOrderForm();
  }
}
function addOrderItem(){
  orderForm.items.push({productId:'', name:'', qty:1, price:0});
  refreshOrderForm();
  const rows = document.querySelectorAll('#itemRows .item-row');
  if(rows.length) rows[rows.length-1].scrollIntoView({block:'center', behavior:'smooth'});
}
function removeOrderItem(idx){ orderForm.items.splice(idx,1); refreshOrderForm(); }
function setOrderItemProduct(idx, productId){
  const p = DB.products.find(x=>x.id===productId);
  orderForm.items[idx].productId = productId;
  orderForm.items[idx].name = p?p.name:'';
  orderForm.items[idx].price = p?p.sellPrice:0;
  if(orderForm.type==='normal' && p && orderForm.items[idx].qty>p.stock) orderForm.items[idx].qty = p.stock;
  refreshOrderForm();
}
function setOrderItemQty(idx, val){
  orderForm.items[idx].qty = Number(val)||0;
  updateOrderTotals();
}
function validateOrderItemQty(idx){
  const it = orderForm.items[idx];
  if(!it) return;
  if(it.qty<0) it.qty = 0;
  if(orderForm.type==='normal'){
    const p = DB.products.find(x=>x.id===it.productId);
    if(p && it.qty>p.stock){ it.qty = p.stock; alert('Số lượng vượt quá tồn kho. Đã điều chỉnh về tối đa: '+p.stock); }
  }
  refreshOrderForm();
}
function setOrderItemPrice(idx, val){ orderForm.items[idx].price = Number(val)||0; updateOrderTotals(); }
function updateOrderTotals(){
  const iv = document.getElementById('itemsValueDisplay'); if(iv) iv.textContent = fmt(orderItemsValue(orderForm));
  const gt = document.getElementById('grandTotalDisplay'); if(gt) gt.textContent = fmt(orderTotal(orderForm));
}
function refreshOrderForm(){
  const locked = orderForm.id && orderForm.stockDeducted;
  const modalBody = document.querySelector('#modalRoot .modal-body');
  const scrollPos = modalBody ? modalBody.scrollTop : 0;
  document.getElementById('modalRoot').querySelector('.modal').innerHTML = orderFormHtml(locked);
  const newModalBody = document.querySelector('#modalRoot .modal-body');
  if(newModalBody) newModalBody.scrollTop = scrollPos;
}
function saveOrder(asDraft){
  const f = orderForm;
  if(!asDraft){
    if(!f.customerName.trim() || !f.phone.trim()){ alert('Vui lòng nhập tên người nhận và số điện thoại'); return; }
    const validItems = f.items.filter(it=>it.productId && it.qty>0);
    if(validItems.length===0){ alert('Vui lòng thêm ít nhất 1 sản phẩm hợp lệ'); return; }
    f.items = validItems;
  } else {
    f.items = f.items.filter(it=>it.productId && it.qty>0);
    f.status = 'nhap';
  }
  f.updatedAt = todayISO();

  if(f.id){
    const idx = DB.orders.findIndex(x=>x.id===f.id);
    DB.orders[idx] = f;
    if(f.status==='xac_nhan' && !f.stockDeducted){
      const insufficient = f.items.filter(it=>{ const p=DB.products.find(x=>x.id===it.productId); return !p||p.stock<it.qty; });
      if(insufficient.length){ alert('Không đủ hàng trong kho cho: '+insufficient.map(i=>i.name).join(', ')); return; }
      f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock-=it.qty; });
      f.stockDeducted = true;
    }
    if((f.status==='huy'||f.status==='nhap'||f.status==='cho_hang') && f.stockDeducted){
      f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock+=it.qty; });
      f.stockDeducted = false;
    }
  } else {
    f.id = uid();
    f.code = genCode('DH','order',6);
    f.createdAt = todayISO();
    if(f.status==='xac_nhan'){
      const insufficient = f.items.filter(it=>{ const p=DB.products.find(x=>x.id===it.productId); return !p||p.stock<it.qty; });
      if(insufficient.length){ alert('Không đủ hàng trong kho cho: '+insufficient.map(i=>i.name).join(', ')); return; }
      f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock-=it.qty; });
      f.stockDeducted = true;
    }
    DB.orders.push(f);
  }
  saveDB(); closeModal(); orderForm=null; renderOrdersResults(); renderNav(); if(activeTab==='dashboard') renderDashboard();
}
function openOrderDetail(orderId){ openOrderModal(null, orderId); }

/* ======================= COMPLAINTS ======================= */
let complaintForm = null;
let compUi = { typeFilter:'', statusFilter:'' };
function complaintDescription(c){
  if(c.compensationType==='hoan_tien') return 'Hoàn tiền'+(c.refundValue? ' — '+fmt(c.refundValue) : '');
  return (c.items&&c.items.length? c.items.map(i=>i.name+' x'+i.qty).join(', ') : 'Gửi hàng bù');
}
const MERGED_COMP_STATUSES = (()=>{
  const seen = {}; const out = [];
  [...REFUND_STATUSES, ...SHIP_COMP_STATUSES].forEach(s=>{ if(!seen[s.key]){ seen[s.key]=true; out.push(s); } });
  return out;
})();
function complaintStatusKey(c){ return c.compensationType==='hoan_tien' ? c.statusRefund : c.statusShip; }
let compSort = {key:'updatedAt', dir:-1};
function compSortVal(c, key){
  if(key==='updatedAt') return new Date(c.updatedAt||c.createdAt).getTime();
  if(key==='createdAt') return new Date(c.createdAt).getTime();
  if(key==='refundValue') return Number(c.refundValue||0);
  if(key==='statusRefund') return statusMeta(c.statusRefund,REFUND_STATUSES).label;
  if(key==='statusShip') return statusMeta(c.statusShip,SHIP_COMP_STATUSES).label;
  return c[key];
}
function renderComplaints(){
  const list = [...DB.complaints]
    .filter(c=> (!compUi.typeFilter || c.compensationType===compUi.typeFilter)
             && (!compUi.statusFilter || complaintStatusKey(c)===compUi.statusFilter));
  list.sort((a,b)=> cmpVals(compSortVal(a,compSort.key), compSortVal(b,compSort.key)) * compSort.dir);
  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <select class="inline-select" style="max-width:170px" onchange="compUi.typeFilter=this.value; renderComplaints()">
        <option value="">Tất cả hình thức đền</option>
        ${Object.entries(COMP_TYPES).map(([k,v])=>`<option value="${k}" ${compUi.typeFilter===k?'selected':''}>${v}</option>`).join('')}
      </select>
      <select class="inline-select" style="max-width:180px" onchange="compUi.statusFilter=this.value; renderComplaints()">
        <option value="">Tất cả trạng thái</option>
        ${MERGED_COMP_STATUSES.map(s=>`<option value="${s.key}" ${compUi.statusFilter===s.key?'selected':''}>${s.label}</option>`).join('')}
      </select>
      ${(compUi.typeFilter||compUi.statusFilter)? `<button class="btn btn-secondary btn-sm" onclick="compUi.typeFilter='';compUi.statusFilter=''; renderComplaints()">✕ Xóa lọc</button>`:''}
      <span class="muted small">${list.length} khiếu nại/đền hàng</span>
    </div>
    <div class="table-wrap"><table style="table-layout:fixed"><colgroup>
      <col style="width:10%"><col style="width:15%"><col style="width:17%"><col style="width:9%"><col style="width:9%"><col style="width:9%"><col style="width:12%"><col style="width:12%"><col style="width:7%">
    </colgroup><thead><tr>
      <th onclick="toggleSort(compSort,'code'); renderComplaints()">Mã hàng bù${sortArrow(compSort,'code')}</th>
      <th onclick="toggleSort(compSort,'customerName'); renderComplaints()">Khách hàng${sortArrow(compSort,'customerName')}</th>
      <th>Mô tả</th>
      <th onclick="toggleSort(compSort,'refundValue'); renderComplaints()">Tổng giá trị bù${sortArrow(compSort,'refundValue')}</th>
      <th onclick="toggleSort(compSort,'createdAt'); renderComplaints()">Ngày tạo${sortArrow(compSort,'createdAt')}</th>
      <th onclick="toggleSort(compSort,'updatedAt'); renderComplaints()">Cập nhật lần cuối${sortArrow(compSort,'updatedAt')}</th>
      <th onclick="toggleSort(compSort,'statusRefund'); renderComplaints()">Hoàn tiền${sortArrow(compSort,'statusRefund')}</th>
      <th onclick="toggleSort(compSort,'statusShip'); renderComplaints()">Gửi hàng bù${sortArrow(compSort,'statusShip')}</th>
      <th></th>
    </tr></thead><tbody>
    ${list.length? list.map(c=>`
      <tr>
        <td><b>${c.code}</b></td>
        <td>${c.customerName}<br><span class="muted small">${c.phone}</span></td>
        <td class="small">${complaintDescription(c)}</td>
        <td style="font-weight:700">${fmt(c.refundValue||0)}</td>
        <td class="small">${fmtDate(c.createdAt)}</td>
        <td class="small">${fmtDate(c.updatedAt||c.createdAt)}</td>
        <td>${c.compensationType==='hoan_tien'? selectHtml(c.id, c.statusRefund, REFUND_STATUSES, 'updateComplaintRefundStatus') : '<span class="muted small">—</span>'}</td>
        <td>${c.compensationType==='gui_hang_bu'? selectHtml(c.id, c.statusShip, SHIP_COMP_STATUSES, 'updateComplaintShipStatus') : '<span class="muted small">—</span>'}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="openComplaintModal('${c.id}')">Chi tiết</button></td>
      </tr>`).join('') : `<tr><td colspan="9" class="empty">Chưa có khiếu nại/đền hàng nào</td></tr>`}
    </tbody></table></div>
  `;
}
function updateComplaintRefundStatus(id, val){
  const c = DB.complaints.find(x=>x.id===id); if(!c) return;
  c.statusRefund = val; c.updatedAt = todayISO();
  saveDB(); renderComplaints();
}
function updateComplaintShipStatus(id, val){
  const c = DB.complaints.find(x=>x.id===id); if(!c) return;
  if(val==='huy' && c.stockDeducted){
    c.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock+=it.qty; });
    c.stockDeducted = false;
  } else if(val!=='huy' && !c.stockDeducted){
    const insufficient = c.items.filter(it=>{ const p=DB.products.find(x=>x.id===it.productId); return !p||p.stock<it.qty; });
    if(insufficient.length){ alert('Không đủ hàng trong kho cho: '+insufficient.map(i=>i.name).join(', ')); renderComplaints(); return; }
    c.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock-=it.qty; });
    c.stockDeducted = true;
  }
  c.statusShip = val; c.updatedAt = todayISO();
  saveDB(); renderComplaints(); renderNav();
}
function openComplaintModal(existingId){
  const existing = existingId? DB.complaints.find(x=>x.id===existingId) : null;
  complaintForm = existing? JSON.parse(JSON.stringify(existing)) : {id:null, orderId:'', customerName:'', phone:'', address:'', items:[],
    compensationType:'hoan_tien', refundValue:0, stockDeducted:false,
    carrier:'', trackingCode:'', shipFee:0, shipPayer:'shop', statusShip:'cho_gui', statusRefund:'cho_xac_nhan',
    reasonType:'loi_san_pham', reasonOther:'', note:'', createdAt: todayISO(), updatedAt: todayISO()};
  openModal(complaintFormHtml(), true);
}
function complaintCompCost(f){
  const itemsCost = f.items.reduce((s,it)=>{ const p=DB.products.find(x=>x.id===it.productId); return s+(p?p.importPrice:0)*it.qty; },0);
  return itemsCost + Number(f.shipFee||0);
}
function updateComplaintCompCostDisplay(){
  const el = document.getElementById('compCostDisplay');
  if(el) el.textContent = fmt(complaintCompCost(complaintForm));
}
function showOrderSuggestions(query){
  const box = document.getElementById('orderSuggestBox');
  if(!box) return;
  const q = (query||'').trim().toLowerCase();
  if(!q){ box.innerHTML=''; return; }
  const matches = DB.orders.filter(o=>(o.code+' '+o.customerName+' '+o.phone).toLowerCase().includes(q)).slice(0,8);
  if(matches.length===0){ box.innerHTML = `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;padding:8px 10px;font-size:12px;color:var(--muted);margin-top:2px">Không tìm thấy đơn hàng</div>`; return; }
  box.innerHTML = `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;max-height:200px;overflow-y:auto;overflow-x:hidden;margin-top:2px">
    ${matches.map(o=>`<div style="padding:8px 10px;cursor:pointer;border-bottom:1px solid #F0F1F5;font-size:12.5px" onmousedown="selectOrderForComplaint('${o.id}')">
      <b>${o.code}</b> — ${o.customerName}<div class="muted small">${o.phone} — ${o.items.map(i=>i.name+' x'+i.qty).join(', ')}</div>
    </div>`).join('')}
  </div>`;
}
function hideOrderSuggestions(){ const box = document.getElementById('orderSuggestBox'); if(box) box.innerHTML=''; }
function selectOrderForComplaint(orderId){
  const o = DB.orders.find(x=>x.id===orderId);
  if(!o) return;
  complaintForm.orderId = o.id;
  complaintForm.customerName = o.customerName;
  complaintForm.phone = o.phone;
  complaintForm.address = o.address;
  complaintForm.items = o.items.map(it=>({productId:it.productId, name:it.name, qty:it.qty}));
  refreshComplaintForm();
}
function clearOrderLink(){
  complaintForm.orderId = '';
  refreshComplaintForm();
}
function complaintItemRowsHtml(){
  const f = complaintForm;
  if(f.items.length===0) return `<div class="muted small" style="margin-bottom:8px">Chưa có sản phẩm nào</div>`;
  return f.items.map((it,idx)=>{
    const p = DB.products.find(x=>x.id===it.productId);
    return `<div class="item-row" style="grid-template-columns:2.4fr 1fr auto" data-idx="${idx}">
      <div style="position:relative">
        <input type="text" value="${p? p.name : ''}" placeholder="Gõ tên sản phẩm để tìm..." autocomplete="off"
          oninput="showCompProductSuggestions(${idx}, this.value)"
          onfocus="showCompProductSuggestions(${idx}, this.value)"
          onblur="setTimeout(()=>hideCompProductSuggestions(${idx}),150)">
        <div id="compProdSuggest_${idx}"></div>
      </div>
      <div><input type="number" min="1" value="${it.qty}" oninput="complaintForm.items[${idx}].qty=Number(this.value)||0; updateComplaintCompCostDisplay()"></div>
      <div><button class="rm-item" onclick="complaintForm.items.splice(${idx},1); refreshComplaintForm()">✕</button></div>
    </div>`;
  }).join('');
}
function showCompProductSuggestions(idx, query){
  const box = document.getElementById('compProdSuggest_'+idx);
  if(!box) return;
  const q = (query||'').trim().toLowerCase();
  const matches = DB.products.filter(p=>(p.name+' '+p.code).toLowerCase().includes(q)).slice(0,8);
  if(matches.length===0){ box.innerHTML = q? `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;padding:8px 10px;font-size:12px;color:var(--muted);margin-top:2px">Không tìm thấy sản phẩm</div>` : ''; return; }
  box.innerHTML = `<div style="position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 6px 18px rgba(20,30,60,.12);z-index:30;max-height:200px;overflow-y:auto;overflow-x:hidden;margin-top:2px">
    ${matches.map(p=>`<div style="padding:8px 10px;cursor:pointer;border-bottom:1px solid #F0F1F5;font-size:12.5px" onmousedown="selectCompProductForItem(${idx}, '${p.id}')">
      <b>${p.name}</b><div class="muted small">${p.code} — Tồn: ${p.stock}</div>
    </div>`).join('')}
  </div>`;
}
function hideCompProductSuggestions(idx){ const box = document.getElementById('compProdSuggest_'+idx); if(box) box.innerHTML=''; }
function selectCompProductForItem(idx, productId){
  const p = DB.products.find(x=>x.id===productId);
  complaintForm.items[idx].productId = productId;
  complaintForm.items[idx].name = p? p.name : '';
  refreshComplaintForm();
}

const REASON_LABELS = {loi_san_pham:'Lỗi sản phẩm', loi_van_chuyen:'Lỗi vận chuyển', khac:'Khác'};
function complaintReasonText(c){ return c.reasonType==='khac' ? (c.reasonOther||'Khác') : REASON_LABELS[c.reasonType]||''; }
function refreshComplaintForm(){
  const modalBody = document.querySelector('#modalRoot .modal-body');
  const scrollPos = modalBody? modalBody.scrollTop : 0;
  document.getElementById('modalRoot').querySelector('.modal').innerHTML = complaintFormHtml();
  const newBody = document.querySelector('#modalRoot .modal-body');
  if(newBody) newBody.scrollTop = scrollPos;
}
function saveComplaint(){
  const f = complaintForm;
  if(!f.customerName.trim() || !f.phone.trim()){ alert('Vui lòng nhập tên khách hàng và số điện thoại'); return; }
  f.items = f.items.filter(it=>it.productId && it.qty>0);
  f.updatedAt = todayISO();

  if(f.compensationType==='gui_hang_bu'){
    f.refundValue = complaintCompCost(f);
    if(f.statusShip!=='huy' && !f.stockDeducted){
      const insufficient = f.items.filter(it=>{ const p=DB.products.find(x=>x.id===it.productId); return !p||p.stock<it.qty; });
      if(insufficient.length){ alert('Không đủ hàng trong kho để gửi bù cho: '+insufficient.map(i=>i.name).join(', ')); return; }
      f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock-=it.qty; });
      f.stockDeducted = true;
    } else if(f.statusShip==='huy' && f.stockDeducted){
      f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock+=it.qty; });
      f.stockDeducted = false;
    }
  } else if(f.stockDeducted){
    // đã đổi từ gửi hàng bù sang hoàn tiền — hồi lại kho đã trừ trước đó
    f.items.forEach(it=>{ const p=DB.products.find(x=>x.id===it.productId); if(p) p.stock+=it.qty; });
    f.stockDeducted = false;
  }

  if(f.id){
    const idx = DB.complaints.findIndex(x=>x.id===f.id);
    DB.complaints[idx] = f;
  } else {
    f.id = uid(); f.code = genCode('HB','complaint',5);
    DB.complaints.push(f);
  }
  saveDB(); closeModal(); complaintForm=null; renderComplaints(); renderNav();
}

/* ======================= REPORTS ======================= */
let repRange = null;
let repBreakdownSort = {key:'revenue', dir:-1};
function productCost(o){ return o.items.reduce((ss,it)=>{ const p=DB.products.find(x=>x.id===it.productId); return ss+(p?p.importPrice:0)*it.qty; },0); }
function computeProductBreakdown(from,to){
  const completed = DB.orders.filter(o=>o.status==='hoan_tat' && new Date(o.createdAt)>=from && new Date(o.createdAt)<=to);
  const totalRevenue = completed.reduce((s,o)=>s+orderItemsValue(o),0) || 1;
  const rangeLen = to.getTime()-from.getTime();
  const prevTo = new Date(from.getTime()-1);
  const prevFrom = new Date(from.getTime()-rangeLen-1);
  const prevCompleted = DB.orders.filter(o=>o.status==='hoan_tat' && new Date(o.createdAt)>=prevFrom && new Date(o.createdAt)<=prevTo);
  const map = {};
  completed.forEach(o=>o.items.forEach(it=>{
    map[it.productId] = map[it.productId] || {qty:0, revenue:0, cost:0};
    map[it.productId].qty += it.qty;
    map[it.productId].revenue += it.qty*it.price;
    const p = DB.products.find(x=>x.id===it.productId);
    map[it.productId].cost += (p?p.importPrice:0)*it.qty;
  }));
  const prevMap = {};
  prevCompleted.forEach(o=>o.items.forEach(it=>{ prevMap[it.productId] = (prevMap[it.productId]||0) + it.qty*it.price; }));
  return Object.keys(map).map(pid=>{
    const p = DB.products.find(x=>x.id===pid);
    const cur = map[pid].revenue, prev = prevMap[pid]||0;
    let trend = null;
    if(prev>0) trend = ((cur-prev)/prev)*100;
    else if(cur>0) trend = null; // "new"
    return { code:p?p.code:'—', name:p?p.name:'(đã xóa)', qty:map[pid].qty, revenue:cur,
      cost:map[pid].cost, profit:cur-map[pid].cost, share:(cur/totalRevenue)*100,
      trend, isNew: prev===0 && cur>0 };
  }).sort((a,b)=>b.revenue-a.revenue);
}
function renderReports(){
  if(!repRange){ const now=new Date(); repRange = {from:new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10), to:now.toISOString().slice(0,10)}; }
  const from = new Date(repRange.from);
  const to = new Date(repRange.to); to.setHours(23,59,59,999);
  const completed = DB.orders.filter(o=>o.status==='hoan_tat' && new Date(o.createdAt)>=from && new Date(o.createdAt)<=to);
  const cancelled = DB.orders.filter(o=>o.status==='huy' && new Date(o.createdAt)>=from && new Date(o.createdAt)<=to);
  const grossRevenue = completed.reduce((s,o)=>s+orderItemsValue(o),0);
  const cost = completed.reduce((s,o)=>s+productCost(o),0);
  const qtySold = completed.reduce((s,o)=>s+o.items.reduce((ss,it)=>ss+it.qty,0),0);
  const shipCollected = completed.reduce((s,o)=>s+Number(o.shipFee||0),0);
  const uniqueCustomers = new Set(completed.map(o=>o.phone)).size;
  const complaintsInRange = DB.complaints.filter(c=>new Date(c.createdAt)>=from && new Date(c.createdAt)<=to);
  const activeCompensations = complaintsInRange.filter(c=>complaintStatusKey(c)!=='huy');
  const compensationDeduction = activeCompensations.reduce((s,c)=>s+Number(c.refundValue||0),0);
  const revenue = grossRevenue - compensationDeduction;
  const profit = revenue-cost;
  const breakdown = computeProductBreakdown(from,to);
  breakdown.sort((a,b)=> cmpVals(a[repBreakdownSort.key], b[repBreakdownSort.key]) * repBreakdownSort.dir);

  const days = []; let cur = new Date(from);
  while(cur<=to && days.length<31){ days.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
  const dayRevs = days.map(d=>{
    const dayStart = new Date(d.getFullYear(),d.getMonth(),d.getDate());
    const dayEnd = new Date(dayStart); dayEnd.setHours(23,59,59,999);
    return completed.filter(o=>new Date(o.createdAt)>=dayStart && new Date(o.createdAt)<=dayEnd).reduce((s,o)=>s+orderItemsValue(o),0);
  });
  const maxRev = Math.max(...dayRevs, 1);

  document.getElementById('content').innerHTML = `
    <div class="search-bar">
      <button class="btn btn-secondary btn-sm" onclick="setRepPreset('week')">Tuần này</button>
      <button class="btn btn-secondary btn-sm" onclick="setRepPreset('month')">Tháng này</button>
      <button class="btn btn-secondary btn-sm" onclick="setRepPreset('year')">Năm nay</button>
      <span class="muted small">Từ</span><input type="date" value="${repRange.from}" onchange="repRange.from=this.value; renderReports()">
      <span class="muted small">đến</span><input type="date" value="${repRange.to}" onchange="repRange.to=this.value; renderReports()">
    </div>
    <div class="grid grid-kpi">
      <div class="card kpi accent-teal"><div class="label">Doanh thu (đã trừ đền bù)</div><div class="value">${fmt(revenue)}</div><div class="foot">Gộp trước đền bù: ${fmt(grossRevenue)}</div></div>
      <div class="card kpi accent-amber"><div class="label">Giá vốn</div><div class="value">${fmt(cost)}</div><div class="foot">Trên hàng đã bán</div></div>
      <div class="card kpi accent-green"><div class="label">Lợi nhuận gộp</div><div class="value">${fmt(profit)}</div><div class="foot">Phí ship thu ${fmt(shipCollected)}</div></div>
      <div class="card kpi accent-red"><div class="label">Chi phí đền bù</div><div class="value">${fmt(compensationDeduction)}</div><div class="foot">${activeCompensations.length} khiếu nại (đã trừ vào doanh thu)</div></div>
      <div class="card kpi accent-red"><div class="label">Đơn hủy</div><div class="value">${cancelled.length}</div><div class="foot">Trong kỳ</div></div>
      <div class="card kpi accent-teal"><div class="label">SL sản phẩm bán ra</div><div class="value">${qtySold}</div><div class="foot">Tổng số lượng đã bán</div></div>
      <div class="card kpi accent-green"><div class="label">Khách hàng đã mua</div><div class="value">${uniqueCustomers}</div><div class="foot">Theo số điện thoại duy nhất</div></div>
    </div>
    <div class="section-title">Doanh thu theo ngày</div>
    <div class="card">
      <div class="bars">${dayRevs.map(r=>`<div class="bar" style="height:${Math.max(4,(r/maxRev)*120)}px"><span>${r>0?Math.round(r/1000)+'k':''}</span></div>`).join('')}</div>
      <div style="display:flex;gap:5px;margin-top:2px">${days.map(d=>`<div class="bar-label">${d.getDate()}/${d.getMonth()+1}</div>`).join('')}</div>
    </div>

    <div class="section-title">Chi tiết theo từng sản phẩm <span class="hint">SL bán, doanh số, đóng góp % và xu hướng so với kỳ trước</span></div>
    <div class="table-wrap"><table><thead><tr>
      <th onclick="toggleSort(repBreakdownSort,'code'); renderReports()">Mã SP${sortArrow(repBreakdownSort,'code')}</th>
      <th onclick="toggleSort(repBreakdownSort,'name'); renderReports()">Tên sản phẩm${sortArrow(repBreakdownSort,'name')}</th>
      <th onclick="toggleSort(repBreakdownSort,'qty'); renderReports()">SL bán${sortArrow(repBreakdownSort,'qty')}</th>
      <th onclick="toggleSort(repBreakdownSort,'revenue'); renderReports()">Doanh số${sortArrow(repBreakdownSort,'revenue')}</th>
      <th onclick="toggleSort(repBreakdownSort,'cost'); renderReports()">Giá vốn${sortArrow(repBreakdownSort,'cost')}</th>
      <th onclick="toggleSort(repBreakdownSort,'profit'); renderReports()">Lợi nhuận${sortArrow(repBreakdownSort,'profit')}</th>
      <th onclick="toggleSort(repBreakdownSort,'share'); renderReports()">% Đóng góp DT${sortArrow(repBreakdownSort,'share')}</th>
      <th>Xu hướng</th>
    </tr></thead><tbody>
    ${breakdown.length? breakdown.map(r=>`
      <tr>
        <td>${r.code}</td><td>${r.name}</td><td>${r.qty}</td><td>${fmt(r.revenue)}</td><td>${fmt(r.cost)}</td>
        <td style="color:var(--green);font-weight:700">${fmt(r.profit)}</td>
        <td>${r.share.toFixed(1)}%<div class="progress-bg"><div class="progress-fill" style="width:${Math.min(100,r.share)}%"></div></div></td>
        <td>${r.isNew? '<span class="trend-flat">Mới</span>' : (r.trend===null? '<span class="trend-flat">—</span>' : (r.trend>=0? `<span class="trend-up">▲ ${r.trend.toFixed(0)}%</span>` : `<span class="trend-down">▼ ${Math.abs(r.trend).toFixed(0)}%</span>`))}</td>
      </tr>`).join('') : `<tr><td colspan="8" class="empty">Không có dữ liệu bán hàng trong khoảng thời gian này</td></tr>`}
    </tbody></table></div>

    <div class="section-title">Chi tiết đơn hoàn tất trong kỳ</div>
    <div class="table-wrap"><table><thead><tr><th>Mã đơn</th><th>Ngày</th><th>Khách hàng</th><th>Giá trị</th><th>Giá vốn</th><th>Lợi nhuận</th></tr></thead><tbody>
    ${completed.length? completed.map(o=>{
      const c = productCost(o); const v = orderItemsValue(o);
      return `<tr><td>${o.code}</td><td class="small">${fmtDate(o.createdAt)}</td><td>${o.customerName}</td><td>${fmt(v)}</td><td>${fmt(c)}</td><td style="color:var(--green);font-weight:700">${fmt(v-c)}</td></tr>`;
    }).join('') : `<tr><td colspan="6" class="empty">Không có đơn hoàn tất trong khoảng thời gian này</td></tr>`}
    </tbody></table></div>
  `;
}
function setRepPreset(kind){
  const now = new Date();
  if(kind==='week'){ const d=new Date(now); d.setDate(now.getDate()-now.getDay()); repRange={from:d.toISOString().slice(0,10), to:now.toISOString().slice(0,10)}; }
  if(kind==='month'){ repRange={from:new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10), to:now.toISOString().slice(0,10)}; }
  if(kind==='year'){ repRange={from:new Date(now.getFullYear(),0,1).toISOString().slice(0,10), to:now.toISOString().slice(0,10)}; }
  renderReports();
}

/* ======================= EXPORTS ======================= */
function exportCarrierExcel(carrier){
  const orders = DB.orders.filter(o=>o.carrier===carrier && o.status!=='huy' && o.status!=='nhap');
  if(orders.length===0){ alert('Không có đơn hàng phù hợp để xuất cho '+CARRIERS[carrier]); return; }
  const rows = orders.map(o=>({
    'Mã đơn hàng': o.code, 'Tên người nhận': o.customerName, 'Số điện thoại': o.phone, 'Địa chỉ chi tiết': o.address,
    'Sản phẩm': o.items.map(i=>i.name+' x'+i.qty).join(', '), 'Số lượng': o.items.reduce((s,i)=>s+i.qty,0),
    'Giá trị hàng (COD)': o.paymentMethod==='cod' ? orderTotal(o) : 0, 'Phí ship': o.shipFee,
    'Mã vận đơn': o.trackingCode||'', 'Ghi chú': o.note||'',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'DonHang');
  XLSX.writeFile(wb, `don-hang-${carrier}-${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportPreorderNeeds(){
  const rows = computePreorderNeeds().map(r=>({'Mã SP':r.code,'Tên sản phẩm':r.name,'Tồn kho hiện tại':r.stock,'Tổng SL đặt trước':r.needed,'Chênh lệch tồn kho':r.diff,'Trạng thái tồn kho':stockDiffStatus(r.diff).label}));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'CanDatHang');
  XLSX.writeFile(wb, `can-dat-hang-preorder-${new Date().toISOString().slice(0,10)}.xlsx`);
}
async function exportBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `mini-erp-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importBackup(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.products || !data.orders) throw new Error('invalid');
      if(!confirm('Phục hồi sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại. Tiếp tục?')) return;
      DB = data; saveDB(); renderNav(); navigate(activeTab);
      alert('Phục hồi dữ liệu thành công!');
    }catch(err){ alert('File backup không hợp lệ.'); }
  };
  reader.readAsText(file);
}

/* ======================= MODAL HELPERS ======================= */
function openModal(innerHtml, wide, preventOutsideClose){
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" onclick="if(event.target===this && !${preventOutsideClose?'true':'false'}) closeModal()">
      <div class="modal" style="${wide?'max-width:680px':''}">${innerHtml}</div>
    </div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ======================= INIT ======================= */
async function initApp(){
  await loadSheetConfig();
  renderNav();
  navigate('dashboard');
}
initApp();
</script>
